<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVPUtils Commit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<style>
/* Hide all scrollbars globally while keeping scroll functionality */
* {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
*::-webkit-scrollbar {
  display: none;
  width: 0;
  height: 0;
}

:root {
  --md-sys-color-surface: #0f1118;
  --md-sys-color-surface-container: #151720;
  --md-sys-color-surface-container-high: #1b1d2a;
  --md-sys-color-surface-container-highest: #212436;
  --md-sys-color-primary: #c2b8ff;
  --md-sys-color-primary-container: #3a3560;
  --md-sys-color-on-primary-container: #e0dbff;
  --md-sys-color-secondary: #ffb4d6;
  --md-sys-color-secondary-container: #4a2535;
  --md-sys-color-on-secondary-container: #ffd8e4;
  --md-sys-color-tertiary: #7af0c0;
  --md-sys-color-tertiary-container: #004d38;
  --md-sys-color-on-tertiary-container: #b8f7dc;
  --md-sys-color-outline: #5a5d72;
  --md-sys-color-outline-variant: #3a3d50;
  --md-sys-color-error: #ffb4ab;
  --md-sys-color-error-container: #93000a;
  --md-sys-elevation-1: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --md-sys-elevation-2: 0 2px 6px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
  --md-sys-elevation-3: 0 4px 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--md-sys-color-surface);
  color: #e0e0f0;
  font-family: var(--font-display);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Aurora background — composable layers via CSS vars ===== */
.bg-aurora {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.aurora-blob {
  --blob-color: rgba(194, 184, 255, 0.5);
  --blob-size: 40vmax;
  --blob-x: 15%;
  --blob-y: 20%;
  --blob-duration: 22s;
  --blob-delay: 0s;
  position: absolute;
  width: var(--blob-size);
  height: var(--blob-size);
  left: var(--blob-x);
  top: var(--blob-y);
  background: radial-gradient(circle, var(--blob-color) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
  mix-blend-mode: screen;
  opacity: 0.55;
  will-change: transform, opacity;
  animation: aurora-drift var(--blob-duration) ease-in-out var(--blob-delay) infinite;
}

.aurora-blob.b1 {
  --blob-color: rgba(194, 184, 255, 0.6);
  --blob-size: 50vmax;
  --blob-x: -10%;
  --blob-y: -5%;
  --blob-duration: 20s;
  --blob-delay: 0s;
}

.aurora-blob.b2 {
  --blob-color: rgba(255, 180, 214, 0.5);
  --blob-size: 42vmax;
  --blob-x: 70%;
  --blob-y: 10%;
  --blob-duration: 24s;
  --blob-delay: -6s;
}

.aurora-blob.b3 {
  --blob-color: rgba(122, 240, 192, 0.45);
  --blob-size: 46vmax;
  --blob-x: 50%;
  --blob-y: 70%;
  --blob-duration: 22s;
  --blob-delay: -12s;
}

.aurora-blob.b4 {
  --blob-color: rgba(255, 180, 171, 0.3);
  --blob-size: 34vmax;
  --blob-x: 20%;
  --blob-y: 60%;
  --blob-duration: 26s;
  --blob-delay: -18s;
}

.aurora-blob.b5 {
  --blob-color: rgba(160, 200, 255, 0.35);
  --blob-size: 38vmax;
  --blob-x: 80%;
  --blob-y: 75%;
  --blob-duration: 28s;
  --blob-delay: -3s;
}

.aurora-blob.b6 {
  --blob-color: rgba(220, 170, 255, 0.3);
  --blob-size: 36vmax;
  --blob-x: 10%;
  --blob-y: 45%;
  --blob-duration: 25s;
  --blob-delay: -15s;
}

@keyframes aurora-drift {
  0%, 100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.55;
  }
  25% {
    transform: translate(18vw, 12vh) scale(1.2);
    opacity: 0.7;
  }
  50% {
    transform: translate(-12vw, 20vh) scale(0.85);
    opacity: 0.45;
  }
  75% {
    transform: translate(10vw, -14vh) scale(1.15);
    opacity: 0.6;
  }
}

/* Flowing light streaks — subtle horizontal beams */
.aurora-streak {
  position: absolute;
  width: 200%;
  height: 1px;
  left: -50%;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(194, 184, 255, 0.4) 30%,
    rgba(255, 180, 214, 0.5) 50%,
    rgba(122, 240, 192, 0.4) 70%,
    transparent 100%
  );
  filter: blur(1px);
  opacity: 0;
  animation: streak-flow 12s linear infinite;
}

.aurora-streak.s1 { top: 20%; animation-delay: 0s; animation-duration: 12s; }
.aurora-streak.s2 { top: 45%; animation-delay: -4s; animation-duration: 16s; }
.aurora-streak.s3 { top: 70%; animation-delay: -9s; animation-duration: 14s; }
.aurora-streak.s4 { top: 35%; animation-delay: -6s; animation-duration: 18s; height: 2px; }
.aurora-streak.s5 { top: 85%; animation-delay: -11s; animation-duration: 15s; }

@keyframes streak-flow {
  0% { transform: translateX(-30%) translateY(0); opacity: 0; }
  15% { opacity: 0.75; }
  85% { opacity: 0.75; }
  100% { transform: translateX(30%) translateY(-3px); opacity: 0; }
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce) {
  .aurora-blob, .aurora-streak, .bg-grid, .bg-grid::after {
    animation: none;
    opacity: 0.3;
  }
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(194, 184, 255, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 60%, rgba(255, 180, 214, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(122, 240, 192, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: grid-shift 40s ease-in-out infinite;
}

.bg-grid::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 70%);
  animation: grid-pulse 8s ease-in-out infinite;
}

@keyframes grid-shift {
  0%, 100% { background-position: 0% 0%, 0% 0%, 0% 0%; }
  50% { background-position: 10% 15%, -8% 10%, 5% -10%; }
}

@keyframes grid-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.header {
  position: relative;
  z-index: 1;
  padding: 48px 32px 32px;
  margin-top: 24px;
  text-align: center;
}

.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--md-sys-color-primary), transparent);
}

.header h1 {
  font-size: 2rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  color: #7a7d94;
  font-size: 0.85rem;
  margin-top: 6px;
  font-weight: 300;
  letter-spacing: 0.04em;
}

.timeline-card {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 32px 48px;
  perspective: 1400px;
}

.repo-badges {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.repo-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 8px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  font-size: 0.78rem;
  color: #b0b3c8;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, color 0.2s ease;
  user-select: none;
  position: relative;
}

.repo-badge:hover {
  border-color: var(--md-sys-color-outline);
  transform: translateY(-2px) scale(1.02);
}

.repo-badge:active {
  transform: translateY(0) scale(0.97);
  transition-duration: 0.08s;
}

.repo-badge.repo-all.active {
  background: var(--md-sys-color-secondary-container);
  border-color: var(--md-sys-color-secondary);
  color: var(--md-sys-color-on-secondary-container);
  box-shadow: 0 0 12px rgba(255, 180, 214, 0.25);
}

.repo-badge:not(.repo-all):not(.repo-add).active {
  background: var(--repo-bg, var(--md-sys-color-surface-container));
  border-color: var(--repo-border, var(--md-sys-color-outline));
  box-shadow: 0 0 12px var(--repo-glow, transparent);
  color: var(--repo-border, var(--md-sys-color-on-surface));
}

.repo-badge.active .count {
  background: rgba(255,255,255,0.16);
  color: inherit;
}

.repo-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  position: relative;
}

.repo-badge .dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid currentColor;
  opacity: 0;
  animation: dot-pulse 2.4s ease-out infinite;
}

.repo-badge.active .dot::after {
  opacity: 0.6;
}

@keyframes dot-pulse {
  0% { transform: scale(0.8); opacity: 0.6; }
  70% { transform: scale(2.2); opacity: 0; }
  100% { transform: scale(2.2); opacity: 0; }
}

.repo-badge.repo-all .dot {
  background: var(--md-sys-color-secondary);
  box-shadow: 0 0 6px rgba(255, 180, 214, 0.5);
}

.repo-badge.repo-add {
  border-style: dashed;
  color: #7a7d94;
  opacity: 0.8;
}

.repo-badge.repo-add:hover {
  opacity: 1;
  color: var(--md-sys-color-primary);
  border-color: var(--md-sys-color-primary);
}

.repo-badge.repo-add svg { flex-shrink: 0; }

.repo-remove {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 0;
  background: rgba(255,255,255,0.1);
  color: inherit;
  font-size: 0.8rem;
  line-height: 1;
  cursor: pointer;
  margin-left: 2px;
  transition: background 0.2s;
}

.repo-remove:hover {
  background: var(--md-sys-color-error);
  color: #fff;
}

.repo-badge .count {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: #7a7d94;
  padding: 1px 6px;
  background: var(--md-sys-color-surface-container-high);
  border-radius: 0;
}

/* View tabs */
.view-tabs {
  display: flex;
  gap: 0;
  margin: 0 auto 20px;
  padding: 4px;
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 0;
  width: fit-content;
  position: relative;
}

.tab-indicator {
  position: absolute;
  top: 4px;
  left: 4px;
  height: calc(100% - 8px);
  background: var(--md-sys-color-primary-container);
  z-index: 0;
  pointer-events: none;
  opacity: 1;
}

.view-tab {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 18px;
  border-radius: 0;
  background: transparent;
  border: none;
  color: #8a8da0;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--font-display);
  cursor: pointer;
  transition: color 0.25s ease;
  white-space: nowrap;
  transform-origin: center center;
  position: relative;
  z-index: 1;
}

.view-tab:hover {
  color: #d0d0e8;
}

.view-tab.active {
  color: var(--md-sys-color-on-primary-container);
}

.view-tab svg { width: 13px; height: 13px; }

.wide-label { display: inline; }
.narrow-label { display: none; }

@media (max-width: 520px) {
  .wide-label { display: none; }
  .narrow-label { display: inline; }
}

.view-tab .tab-count {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 1px 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 0;
  min-width: 18px;
  text-align: center;
}

.view-tab.active .tab-count { background: rgba(255,255,255,0.16); }

.commit-list-card, .pr-list-card, .issue-list-card {
  background: var(--md-sys-color-surface-container);
  border-radius: 0;
  border: 1px solid var(--md-sys-color-outline-variant);
  overflow: hidden;
  position: relative;
  transform-origin: center center;
}

.commit-list-card::before, .pr-list-card::before, .issue-list-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 0;
}

.commit-list-card::before {
  background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-secondary), var(--md-sys-color-tertiary));
}

.pr-list-card::before {
  background: linear-gradient(90deg, var(--md-sys-color-secondary), var(--md-sys-color-primary));
}

.issue-list-card::before {
  background: linear-gradient(90deg, var(--md-sys-color-tertiary), var(--md-sys-color-secondary));
}

.commit-list {
  padding: 12px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.commit-list::-webkit-scrollbar { display: none; }

.commit-item, .pr-item, .issue-item {
  padding: 14px 16px;
  border-radius: 0;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: background 0.25s ease;
  position: relative;
  cursor: pointer;
  color: inherit;
  flex-direction: column;
}

.commit-item.no-anim, .pr-item.no-anim, .issue-item.no-anim { }

.commit-item:hover, .pr-item:hover, .issue-item:hover {
  background: var(--md-sys-color-surface-container-highest);
}

.commit-item + .commit-item,
.pr-item + .pr-item,
.issue-item + .issue-item { margin-top: 2px; }

.commit-item-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  width: 100%;
}

.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.commit-item .timeline-dot {
  background: var(--dot-color, var(--md-sys-color-primary));
  box-shadow: 0 0 6px var(--dot-glow, rgba(194, 184, 255, 0.4));
}

.pr-item.state-open .timeline-dot,
.issue-item.state-open .timeline-dot {
  background: var(--md-sys-color-tertiary);
  box-shadow: 0 0 6px rgba(122, 240, 192, 0.4);
}

.pr-item.state-closed .timeline-dot,
.issue-item.state-closed .timeline-dot {
  background: var(--md-sys-color-error);
  box-shadow: 0 0 6px rgba(255, 180, 171, 0.4);
}

.pr-item.state-merged .timeline-dot {
  background: var(--md-sys-color-primary);
  box-shadow: 0 0 6px rgba(194, 184, 255, 0.4);
}

.pr-item.state-draft .timeline-dot {
  background: #6a6d80;
}

.commit-item::after, .pr-item::after, .issue-item::after {
  content: '';
  position: absolute;
  left: 21px;
  top: 34px;
  bottom: -4px;
  width: 1px;
  background: var(--md-sys-color-outline-variant);
}

.commit-item:last-child::after,
.pr-item:last-child::after,
.issue-item:last-child::after { display: none; }

.commit-item.expanded::after,
.pr-item.expanded::after,
.issue-item.expanded::after { display: none; }

.commit-content {
  flex: 1;
  min-width: 0;
}

.commit-message {
  font-size: 0.88rem;
  font-weight: 500;
  color: #d0d0e8;
  line-height: 1.4;
  word-break: break-word;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.commit-message .pr-num-prefix {
  font-family: var(--font-mono);
  color: #7a7d94;
  font-weight: 600;
}

.commit-translation {
  font-size: 0.78rem;
  color: var(--md-sys-color-secondary);
  font-weight: 400;
  margin-top: 4px;
  padding-left: 2px;
  line-height: 1.4;
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0.85;
}

.commit-translation::before {
  content: '';
  width: 14px;
  height: 1px;
  background: var(--md-sys-color-outline);
  flex-shrink: 0;
}

.commit-translation.loading { color: #5a5d72; }

.expand-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container-highest);
  color: #7a7d94;
  transition: transform 0.3s ease, background 0.2s;
  flex-shrink: 0;
  margin-left: auto;
}

.commit-item:hover .expand-arrow,
.pr-item:hover .expand-arrow,
.issue-item:hover .expand-arrow {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
}

.commit-item.expanded .expand-arrow,
.pr-item.expanded .expand-arrow,
.issue-item.expanded .expand-arrow {
  transform: rotate(90deg);
}

.commit-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.repo-tag {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 0;
  letter-spacing: 0.02em;
}

.state-badge {
  font-size: 0.66rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 0;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-transform: uppercase;
}

.state-badge svg { width: 10px; height: 10px; }

.state-badge.state-open {
  background: var(--md-sys-color-tertiary-container);
  color: var(--md-sys-color-on-tertiary-container);
}

.state-badge.state-closed {
  background: var(--md-sys-color-error-container);
  color: var(--md-sys-color-error);
}

.state-badge.state-merged {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
}

.state-badge.state-draft {
  background: var(--md-sys-color-surface-container-highest);
  color: #8a8da0;
}

.label-tag {
  font-size: 0.66rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 0;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border: 1px solid currentColor;
}

.label-tag::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.commit-author {
  font-size: 0.75rem;
  color: #7a7d94;
  display: flex;
  align-items: center;
  gap: 5px;
}

.commit-author img {
  width: 18px;
  height: 18px;
  border-radius: 50%;
}

.commit-sha {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: #5a5d72;
  padding: 2px 8px;
  background: var(--md-sys-color-surface-container-highest);
  border-radius: 0;
  transition: color 0.2s;
}

.commit-item:hover .commit-sha { color: var(--md-sys-color-primary); }

.commit-time {
  font-size: 0.72rem;
  color: #5a5d72;
  font-family: var(--font-mono);
}

.pr-branches {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: #8a8da0;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  background: var(--md-sys-color-surface-container-highest);
  border-radius: 0;
}

.pr-branches .branch-arrow { color: #5a5d72; }

.comment-count {
  font-size: 0.7rem;
  color: #7a7d94;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
}

.comment-count svg { width: 11px; height: 11px; }

.pr-link-inline {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 0;
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
}

.pr-link-inline:hover {
  background: var(--md-sys-color-secondary);
  color: var(--md-sys-color-surface);
}

.pr-link-inline svg { width: 11px; height: 11px; }

.commit-detail {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  margin-left: 24px;
  margin-top: 0;
  width: calc(100% - 24px);
  transform-origin: center center;
}

.commit-item, .pr-item, .issue-item {
  perspective: 1400px;
}

.commit-item.expanded .commit-detail,
.pr-item.expanded .commit-detail,
.issue-item.expanded .commit-detail {
  max-height: 3000px;
  opacity: 1;
  margin-top: 12px;
}

.detail-grid {
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 0;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
}

.detail-files {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}

.detail-files-title {
  font-size: 0.72rem;
  color: #8a8da0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
}

.detail-files-title .file-count {
  font-family: var(--font-mono);
  color: var(--md-sys-color-secondary);
  padding: 1px 8px;
  background: var(--md-sys-color-secondary-container);
  border-radius: 0;
  font-size: 0.7rem;
}

.file-block {
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 0;
  overflow: hidden;
  scroll-margin-top: 80px;
}

.file-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--md-sys-color-surface-container-high);
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  gap: 10px;
  flex-wrap: wrap;
}

.file-name {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  color: #d0d0e8;
  font-weight: 500;
  word-break: break-all;
  display: flex;
  align-items: center;
  gap: 6px;
}

.file-name svg {
  width: 13px;
  height: 13px;
  color: #6a6d80;
  flex-shrink: 0;
}

.file-stats {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  flex-shrink: 0;
}

.file-stats .add { color: var(--md-sys-color-tertiary); }
.file-stats .del { color: var(--md-sys-color-error); }

.file-toggle {
  background: var(--md-sys-color-surface-container-highest);
  border: none;
  color: #8a8da0;
  cursor: pointer;
  padding: 3px 10px;
  border-radius: 0;
  font-size: 0.68rem;
  font-family: var(--font-display);
  font-weight: 500;
  transition: all 0.2s;
}

.file-toggle:hover {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
}

.file-diff {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.file-block.open .file-diff {
  max-height: 600px;
  overflow-y: auto;
  scrollbar-width: none;
}

.file-diff::-webkit-scrollbar { display: none; }

.diff-line {
  display: flex;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  line-height: 1.55;
  padding: 0;
}

.diff-line .line-num {
  width: 42px;
  min-width: 42px;
  text-align: right;
  padding: 0 8px;
  color: #4a4d5e;
  user-select: none;
  border-right: 1px solid var(--md-sys-color-outline-variant);
}

.diff-line .line-content {
  padding: 0 10px;
  white-space: pre-wrap;
  word-break: break-word;
  flex: 1;
}

.diff-line.add { background: rgba(122, 240, 192, 0.08); }
.diff-line.add .line-content { color: #a8f0d0; }
.diff-line.add .line-num { background: rgba(122, 240, 192, 0.05); }

.diff-line.del { background: rgba(255, 180, 171, 0.08); }
.diff-line.del .line-content { color: #ffc8c0; }
.diff-line.del .line-num { background: rgba(255, 180, 171, 0.05); }

.diff-line.hunk { background: var(--md-sys-color-surface-container-high); color: #6a6d80; }
.diff-line.hunk .line-content { color: #6a6d80; font-style: italic; }
.diff-line.context .line-content { color: #7a7d94; }

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.detail-label {
  font-size: 0.68rem;
  color: #6a6d80;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

.detail-value {
  font-size: 0.82rem;
  color: #d0d0e8;
  font-family: var(--font-mono);
  font-weight: 500;
}

.detail-value.additions { color: var(--md-sys-color-tertiary); }
.detail-value.deletions { color: var(--md-sys-color-error); }
.detail-value.total { color: var(--md-sys-color-secondary); }

.detail-stats-bar {
  grid-column: 1 / -1;
  height: 6px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container-highest);
  overflow: hidden;
  display: flex;
  margin-top: 4px;
}

.stat-add { background: var(--md-sys-color-tertiary); transition: width 0.5s ease; }
.stat-del { background: var(--md-sys-color-error); transition: width 0.5s ease; }

.detail-message, .pr-body, .issue-body {
  grid-column: 1 / -1;
  font-size: 0.78rem;
  color: #b0b3c8;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--md-sys-color-surface-container-highest);
  padding: 12px 14px;
  border-radius: 0;
  font-family: var(--font-mono);
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: none;
}

.detail-message::-webkit-scrollbar,
.pr-body::-webkit-scrollbar,
.issue-body::-webkit-scrollbar { display: none; }

.pr-body:empty, .issue-body:empty { display: none; }

.pr-body img.body-image, .issue-body img.body-image {
  max-width: 100%;
  height: auto;
  border-radius: 0;
  margin: 6px 0;
  display: block;
  border: 1px solid var(--md-sys-color-outline-variant);
}

.pr-body img.body-image:hover, .issue-body img.body-image:hover {
  border-color: var(--md-sys-color-primary);
}

.detail-link {
  grid-column: 1 / -1;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  text-decoration: none;
  padding: 6px 12px;
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  border-radius: 0;
  width: fit-content;
  font-weight: 500;
  transition: all 0.2s;
}

.detail-link:hover {
  background: var(--md-sys-color-secondary);
  color: var(--md-sys-color-surface);
}

.detail-loading {
  grid-column: 1 / -1;
  text-align: center;
  padding: 16px;
  color: #6a6d80;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.detail-loading .mini-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--md-sys-color-outline-variant);
  border-top-color: var(--md-sys-color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.commit-item.new-commit {
  animation: new-commit-glow 1.5s ease-out;
}

@keyframes new-commit-glow {
  0% { background: rgba(194, 184, 255, 0.15); }
  100% { background: transparent; }
}

.load-more-wrap {
  text-align: center;
  margin-top: 16px;
}

.load-more {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  color: #b0b3c8;
  font-size: 0.82rem;
  font-weight: 500;
  font-family: var(--font-display);
  cursor: pointer;
  transition: all 0.25s ease;
}

.load-more:hover {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  border-color: var(--md-sys-color-primary);
  transform: translateY(-1px);
}

.load-more:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.load-more .mini-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--md-sys-color-outline-variant);
  border-top-color: var(--md-sys-color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}

.load-more.loading .mini-spinner { display: block; }
.load-more.loading .load-more-text { opacity: 0.7; }

.loading-shimmer {
  background: linear-gradient(90deg, var(--md-sys-color-surface-container) 0%, var(--md-sys-color-surface-container-highest) 50%, var(--md-sys-color-surface-container) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 0;
  height: 16px;
  margin: 10px 16px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #5a5d72;
}

.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  opacity: 0.3;
}

.top-bar {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}

.github-link, .announcement-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  color: #b0b3c8;
  font-size: 0.75rem;
  font-weight: 500;
  text-decoration: none;
  font-family: var(--font-mono);
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.github-link:hover, .announcement-btn:hover {
  border-color: var(--md-sys-color-outline);
  color: var(--md-sys-color-on-surface);
  transform: translateY(-1px);
}

.github-link:active, .announcement-btn:active {
  transform: translateY(0) scale(0.97);
  transition-duration: 0.08s;
}

.announcement-btn { position: relative; }

.announcement-dot {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--md-sys-color-error);
  display: none;
  animation: dot-pulse 2s ease-out infinite;
}

.announcement-dot.show { display: block; }

.announcement-panel {
  position: fixed;
  top: 60px;
  left: 16px;
  z-index: 20;
  width: 340px;
  max-width: calc(100vw - 32px);
  max-height: 70vh;
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  box-shadow: var(--md-sys-elevation-3);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  transform-origin: top left;
  animation: panel-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes panel-pop {
  from { opacity: 0; transform: scale(0.92) translateY(-8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.announcement-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
}

.announcement-header h3 {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--md-sys-color-on-surface);
}

.announcement-close {
  background: none;
  border: none;
  color: #b0b3c8;
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  padding: 0 4px;
  transition: color 0.2s;
}

.announcement-close:hover { color: var(--md-sys-color-on-surface); }

.announcement-body {
  overflow-y: auto;
  scrollbar-width: none;
  padding: 12px 16px;
  flex: 1;
}

.announcement-body::-webkit-scrollbar { display: none; }

.announcement-item {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.announcement-item:last-child { border-bottom: none; }

.announcement-item:first-child { padding-top: 4px; }

.announcement-date {
  font-size: 0.7rem;
  color: var(--md-sys-color-primary);
  font-family: var(--font-mono);
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.announcement-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--md-sys-color-on-surface);
  margin-bottom: 4px;
}

.announcement-content {
  font-size: 0.78rem;
  line-height: 1.5;
  color: #b0b3c8;
}

.announcement-content ul {
  margin: 4px 0 0;
  padding-left: 16px;
}

.announcement-content li {
  margin-bottom: 2px;
}

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: modal-fade-in 0.2s ease;
}

@keyframes modal-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-card {
  width: 420px;
  max-width: calc(100vw - 32px);
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  box-shadow: var(--md-sys-elevation-3);
  animation: modal-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}

@keyframes modal-pop {
  from { opacity: 0; transform: scale(0.92) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
}

.modal-header h3 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
  color: var(--md-sys-color-on-surface);
}

.modal-close {
  background: none;
  border: none;
  color: #b0b3c8;
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
  padding: 0 4px;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--md-sys-color-on-surface); }

.modal-body {
  padding: 18px 20px 8px;
}

.modal-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 500;
  color: #b0b3c8;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.modal-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.modal-input-wrap:focus-within {
  border-color: var(--md-sys-color-primary);
  box-shadow: 0 0 0 3px rgba(194, 184, 255, 0.15);
}

.modal-input-icon {
  flex-shrink: 0;
  color: #7a7d94;
  margin-left: 12px;
}

.modal-input-wrap:focus-within .modal-input-icon {
  color: var(--md-sys-color-primary);
}

.modal-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 12px 14px 12px 10px;
  font-size: 0.88rem;
  font-family: var(--font-mono);
  color: var(--md-sys-color-on-surface);
  width: 100%;
}

.modal-input::placeholder {
  color: #5a5d6e;
  font-family: var(--font-mono);
}

.modal-hint {
  margin: 10px 0 0;
  font-size: 0.72rem;
  color: #6a6d80;
  line-height: 1.5;
}

.modal-hint code {
  font-family: var(--font-mono);
  background: var(--md-sys-color-surface-container);
  padding: 1px 6px;
  color: var(--md-sys-color-primary);
}

.modal-error {
  margin: 8px 0 0;
  font-size: 0.75rem;
  color: var(--md-sys-color-error);
  min-height: 1em;
  display: none;
}

.modal-error.show { display: block; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 14px 20px 18px;
}

.modal-btn {
  padding: 9px 18px;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.modal-btn-cancel {
  background: transparent;
  border: 1px solid var(--md-sys-color-outline-variant);
  color: #b0b3c8;
}

.modal-btn-cancel:hover {
  border-color: var(--md-sys-color-outline);
  color: var(--md-sys-color-on-surface);
}

.modal-btn-confirm {
  background: var(--md-sys-color-primary);
  border: 1px solid var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary, #0f1118);
}

.modal-btn-confirm:hover {
  background: var(--md-sys-color-on-primary-container);
  transform: translateY(-1px);
}

.modal-btn-confirm:active,
.modal-btn-cancel:active {
  transform: translateY(0) scale(0.97);
  transition-duration: 0.08s;
}

.refresh-indicator {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 10;
  padding: 8px 16px;
  border-radius: 0;
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  font-size: 0.75rem;
  color: #b0b3c8;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  cursor: pointer;
  user-select: none;
}

.refresh-indicator:hover {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  border-color: var(--md-sys-color-primary);
  transform: translateY(-1px);
  box-shadow: var(--md-sys-elevation-2);
}

.refresh-indicator:active { transform: translateY(0); }

.refresh-indicator.refreshing {
  pointer-events: none;
  opacity: 0.7;
}

.refresh-indicator .spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--md-sys-color-outline);
  border-top-color: var(--md-sys-color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  opacity: 0;
  transition: opacity 0.2s;
}

.refresh-indicator.refreshing .spinner { opacity: 1; }

.refresh-indicator .refresh-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--md-sys-color-tertiary);
  transition: transform 0.4s ease;
}

.refresh-indicator:hover .refresh-icon {
  transform: rotate(180deg);
  color: var(--md-sys-color-on-primary-container);
}

.refresh-indicator .live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--md-sys-color-tertiary);
  box-shadow: 0 0 6px var(--md-sys-color-tertiary);
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  z-index: 20;
  padding: 12px 24px;
  border-radius: 0;
  background: var(--md-sys-color-error-container);
  color: var(--md-sys-color-error);
  font-size: 0.85rem;
  font-weight: 500;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--md-sys-elevation-3);
}

.error-toast.show {
  transform: translateX(-50%) translateY(0);
}

.browser-warning {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--md-sys-color-error-container);
  color: var(--md-sys-color-error);
  border-bottom: 1px solid var(--md-sys-color-error);
  box-shadow: var(--md-sys-elevation-2);
}

.browser-warning-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  font-weight: 500;
}

.browser-warning-inner svg {
  flex-shrink: 0;
}

.browser-warning-inner span {
  flex: 1;
  line-height: 1.4;
}

.browser-warning-close {
  flex-shrink: 0;
  background: none;
  border: none;
  color: inherit;
  font-size: 1.4rem;
  line-height: 1;

<script>
// ---------- Browser detection ----------
window.__noAnime = false;
(function detectBrowser() {
  const ua = navigator.userAgent;
  const isChromium = /\bChrome\/\d/.test(ua);
  if (!isChromium) {
    window.__noAnime = true;
    const warning = document.getElementById('browserWarning');
    if (warning) warning.style.display = 'block';
  }
})();

// ---------- Announcements (fetched from repo) ----------
const ANNOUNCEMENT_CONFIG_URL = 'https://raw.githubusercontent.com/ThinkReally114/trrrk/main/does/Announcement_Configuration_updated/ANNOUNCEMENT_VERSIONS';
const ANNOUNCEMENT_RAW_URL = 'https://raw.githubusercontent.com/ThinkReally114/trrrk/main/does/';
let ANNOUNCEMENT_VERSIONS = ['1.2', '1.1', '1.0'];

async function fetchAnnouncementVersions() {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    const res = await fetch(ANNOUNCEMENT_CONFIG_URL, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) return;
    const text = await res.text();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('ANNOUNCEMENT_VERSIONS'));
    if (lines.length > 0) {
      ANNOUNCEMENT_VERSIONS = lines;
    }
  } catch (e) {
    // use default versions
  }
}

function parseAnnouncement(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  let title = '', date = '', content = '';
  for (const line of lines) {
    if (line.startsWith('tltle:')) {
      title = line.slice(6).trim();
    } else if (line.startsWith('time:')) {
      date = line.slice(5).trim();
    } else if (line.startsWith('Extended description:')) {
      content = line.slice(21).trim().replace(/\/n/g, '\n');
    }
  }
  return { title, date, content };
}

function formatAnnouncementContent(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length <= 1) return text;
  return '<ul>' + lines.map(l => `<li>${l.trim()}</li>`).join('') + '</ul>';
}

async function fetchAnnouncements() {
  const cached = localStorage.getItem('announcements_cache');
  let announcements = [];
  if (cached) {
    try { announcements = JSON.parse(cached); } catch (e) { announcements = []; }
  }
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    const results = await Promise.allSettled(
      ANNOUNCEMENT_VERSIONS.map(v => fetch(ANNOUNCEMENT_RAW_URL + v, { signal: controller.signal }).then(r => r.ok ? r.text() : Promise.reject()))
    );
    clearTimeout(timeout);
    const fetched = [];
    results.forEach((r, i) => {
      if (r.status === 'fulfilled') {
        const parsed = parseAnnouncement(r.value);
        if (parsed.title && parsed.date) {
          parsed.content = formatAnnouncementContent(parsed.content);
          fetched.push(parsed);
        }
      }
    });
    fetched.sort((a, b) => new Date(b.date) - new Date(a.date));
    if (fetched.length > 0) {
      announcements = fetched;
      localStorage.setItem('announcements_cache', JSON.stringify(announcements));
    }
  } catch (e) {
    // use cached
  }
  return announcements;
}

function initAnnouncement() {
  const body = document.getElementById('announcementBody');
  if (!body) return;
  fetchAnnouncementVersions().then(() => {
    return fetchAnnouncements();
  }).then(announcements => {
    if (announcements.length === 0) {
      body.innerHTML = '<div class="announcement-item"><div class="announcement-date" style="color:#ffb4ab">⚠</div><div class="announcement-title">你的网络卡了喵</div><div class="announcement-content">如果你是中国大陆用户请使用代理喵~</div></div>';
      return;
    }
    body.innerHTML = announcements.map(a => `
      <div class="announcement-item">
        <div class="announcement-date">${a.date}</div>
        <div class="announcement-title">${a.title}</div>
        <div class="announcement-content">${a.content}</div>
      </div>
    `).join('');
    const lastRead = localStorage.getItem('announcement_last_read');
    const latestDate = announcements[0].date;
    if (lastRead !== latestDate && latestDate) {
      document.getElementById('announcementDot').classList.add('show');
    }
  });
}

function toggleAnnouncement() {
  const panel = document.getElementById('announcementPanel');
  const isShown = panel.style.display !== 'none';
  if (isShown) {
    panel.style.display = 'none';
  } else {
    panel.style.display = 'flex';
    // Read latest date from the DOM instead of ANNOUNCEMENTS
    const firstItem = document.querySelector('.announcement-item .announcement-date');
    if (firstItem) {
      const latestDate = firstItem.textContent.trim();
      localStorage.setItem('announcement_last_read', latestDate);
      document.getElementById('announcementDot').classList.remove('show');
    } else {
      // Fallback: try to fetch latest date
      fetchAnnouncements().then(announcements => {
        if (announcements.length > 0) {
          localStorage.setItem('announcement_last_read', announcements[0].date);
          document.getElementById('announcementDot').classList.remove('show');
        }
      });
    }
  }
}

const DEFAULT_REPOS = [
  { owner: 'bakabaicai', repo: 'PVPUtils', key: 'a', label: 'PVPUtils', builtIn: true },
  { owner: 'ThinkReally114', repo: 'pvputils-fix', key: 'b', label: 'pvputils-fix', builtIn: true }
];

// Repo accent colors (cycled for custom repos). [bg, border, glow, dot]
const REPO_COLORS = [
  { bg: 'rgba(194, 184, 255, 0.16)', border: '#c2b8ff', glow: 'rgba(194, 184, 255, 0.25)', dot: '#c2b8ff' },
  { bg: 'rgba(122, 240, 192, 0.16)', border: '#7af0c0', glow: 'rgba(122, 240, 192, 0.25)', dot: '#7af0c0' },
  { bg: 'rgba(255, 180, 214, 0.16)', border: '#ffb4d6', glow: 'rgba(255, 180, 214, 0.25)', dot: '#ffb4d6' },
  { bg: 'rgba(255, 180, 171, 0.16)', border: '#ffb4ab', glow: 'rgba(255, 180, 171, 0.25)', dot: '#ffb4ab' },
  { bg: 'rgba(160, 200, 255, 0.16)', border: '#a0c8ff', glow: 'rgba(160, 200, 255, 0.25)', dot: '#a0c8ff' },
  { bg: 'rgba(220, 170, 255, 0.16)', border: '#dcaaff', glow: 'rgba(220, 170, 255, 0.25)', dot: '#dcaaff' },
  { bg: 'rgba(255, 220, 130, 0.16)', border: '#ffdc82', glow: 'rgba(255, 220, 130, 0.25)', dot: '#ffdc82' },
  { bg: 'rgba(130, 240, 240, 0.16)', border: '#82f0f0', glow: 'rgba(130, 240, 240, 0.25)', dot: '#82f0f0' }
];

let REPOS = [];
let customRepos = [];

function repoColor(key) {
  const idx = key.charCodeAt(0) - 97; // 'a' -> 0
  return REPO_COLORS[idx % REPO_COLORS.length];
}

function loadCustomRepos() {
  try {
    const saved = JSON.parse(localStorage.getItem('custom_repos') || '[]');
    customRepos = Array.isArray(saved) ? saved : [];
  } catch (e) { customRepos = []; }
  rebuildRepos();
}

function saveCustomRepos() {
  localStorage.setItem('custom_repos', JSON.stringify(customRepos.map(r => ({ owner: r.owner, repo: r.repo, label: r.label }))));
}

function rebuildRepos() {
  REPOS = [...DEFAULT_REPOS, ...customRepos];
  renderRepoBadges();
}

function renderRepoBadges() {
  const container = document.getElementById('repoBadges');
  if (!container) return;
  let html = `<div class="repo-badge repo-all ${repoFilter === 'all' ? 'active' : ''}" data-repo="all" onclick="filterRepo('all')">
    <span class="dot"></span><span>全部</span>
  </div>`;
  REPOS.forEach(r => {
    const c = repoColor(r.key);
    const countId = `count-${r.key}`;
    const removeBtn = r.builtIn ? '' : `<span class="repo-remove" onclick="event.stopPropagation(); removeCustomRepo('${r.owner}/${r.repo}')" title="移除">×</span>`;
    html += `<div class="repo-badge repo-${r.key} ${repoFilter === r.key ? 'active' : ''}" data-repo="${r.key}" onclick="filterRepo('${r.key}')" style="--repo-border:${c.border};--repo-bg:${c.bg};--repo-glow:${c.glow}">
      <span class="dot" style="background:${c.dot};box-shadow:0 0 6px ${c.glow}"></span>
      <span>${escapeHtml(r.label)}</span>
      <span class="count" id="${countId}">-</span>
      ${removeBtn}
    </div>`;
  });
  html += `<div class="repo-badge repo-add" onclick="showAddRepoDialog()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>添加</span>
  </div>`;
  container.innerHTML = html;
}

function showAddRepoDialog() {
  const modal = document.getElementById('repoModal');
  const input = document.getElementById('repoInput');
  const error = document.getElementById('repoInputError');
  input.value = '';
  error.classList.remove('show');
  error.textContent = '';
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 50);
}

function closeRepoModal(event) {
  if (event && event.target && event.target.id !== 'repoModal' && event.type === 'click') return;
  document.getElementById('repoModal').style.display = 'none';
}

function confirmAddRepo() {
  const input = document.getElementById('repoInput');
  const error = document.getElementById('repoInputError');
  const value = input.value.trim();
  if (!value) {
    error.textContent = '请输入仓库地址';
    error.classList.add('show');
    input.focus();
    return;
  }
  const parsed = parseRepoInput(value);
  if (!parsed) {
    error.textContent = '格式错误，请输入 owner/repo';
    error.classList.add('show');
    input.focus();
    return;
  }

}

function parseRepoInput(input) {
  let s = input.trim();
  s = s.replace(/^https?:\/\/github\.com\//i, '');
  s = s.replace(/^github\.com\//i, '');
  s = s.replace(/\.git$/i, '');
  s = s.replace(/\/+$/, '');
  const m = s.match(/^([\w.-]+)\/([\w.-]+)$/);
  if (!m) return null;
  return { owner: m[1], repo: m[2] };
}

function addCustomRepo(owner, repo) {
  const exists = REPOS.some(r => r.owner === owner && r.repo === repo);
  if (exists) { showError('该仓库已在追踪列表中'); return; }
  const usedKeys = new Set(REPOS.map(r => r.key));
  let key = 'c';
  while (usedKeys.has(key)) key = String.fromCharCode(key.charCodeAt(0) + 1);
  customRepos.push({ owner, repo, key, label: repo, builtIn: false });
  saveCustomRepos();
  rebuildRepos();
  showError(`已添加 ${owner}/${repo}，正在加载...`);
  refreshAll(true);
  if (currentView === 'prs') refreshPRs();
  if (currentView === 'issues') refreshIssues();
}

function removeCustomRepo(fullName) {
  const [owner, repo] = fullName.split('/');
  customRepos = customRepos.filter(r => !(r.owner === owner && r.repo === repo));
  if (repoFilter !== 'all' && !REPOS.find(r => r.key === repoFilter)) {
    repoFilter = 'all';
  }
  saveCustomRepos();
  rebuildRepos();
  commitStore = commitStore.filter(c => c.repo.owner !== owner || c.repo.repo !== repo);
  prStore = prStore.filter(p => p.repo.owner !== owner || p.repo.repo !== repo);
  issueStore = issueStore.filter(i => i.repo.owner !== owner || i.repo.repo !== repo);
  applyRepoFilter();
  showError(`已移除 ${owner}/${repo}`);
}

// ETag + localStorage cache
let etagStore = {};
let lastRefreshTime = null;
const CACHE_PREFIX = 'pvputils_v1_';

function loadEtags() {
  try { etagStore = JSON.parse(localStorage.getItem(CACHE_PREFIX + 'etags') || '{}'); }
  catch { etagStore = {}; }
}

function saveEtags() {
  try { localStorage.setItem(CACHE_PREFIX + 'etags', JSON.stringify(etagStore)); } catch {}
}

function saveCache(key, data) {
  try {
    localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({
      data, ts: Date.now()
    }));
  } catch {}
}

const CACHE_TTL = 60 * 60 * 1000;

function loadCache(key) {
  try {
    const raw = localStorage.getItem(CACHE_PREFIX + key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.ts && (Date.now() - parsed.ts) > CACHE_TTL) {
      localStorage.removeItem(CACHE_PREFIX + key);
      return null;
    }
    return parsed;
  } catch { return null; }
}

async function fetchWithEtag(url, etagKey) {
  const headers = {};
  if (etagStore[etagKey]) {
    headers['If-None-Match'] = etagStore[etagKey];
  }
  const res = await fetch(url, { headers });
  const etag = res.headers.get('ETag');
  if (etag) {
    etagStore[etagKey] = etag;
    saveEtags();
  }
  if (res.status === 304) {
    return { data: null, notModified: true, rateLimited: false };
  }
  if (res.status === 403 || res.status === 429) {
    return { data: null, notModified: false, rateLimited: true };
  }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return { data, notModified: false, rateLimited: false };
}

// ---------- Utils ----------
function formatTime(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins} 分钟前`;
  if (hours < 24) return `${hours} 小时前`;
  if (days < 7) return `${days} 天前`;
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function formatFullTime(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  return date.toLocaleString('zh-CN', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

function shortSha(sha) { return sha ? sha.slice(0, 7) : ''; }

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function renderBodyHtml(body) {
  if (!body) return '';
  const images = [];
  let text = body;
  text = text.replace(/<img\s+[^>]*>/gi, (match) => {
    const srcMatch = match.match(/src=["']([^"']+)["']/i);
    if (!srcMatch) return match;
    const src = srcMatch[1];
    if (!/^https?:\/\//i.test(src)) return match;
    const widthMatch = match.match(/width=["']?(\d+)["']?/i);
    const heightMatch = match.match(/height=["']?(\d+)["']?/i);
    const altMatch = match.match(/alt=["']([^"']*)["']/i);
    const idx = images.length;
    const img = `<img src="${escapeHtml(src)}" loading="lazy"${widthMatch ? ` width="${widthMatch[1]}"` : ''}${heightMatch ? ` height="${heightMatch[1]}"` : ''}${altMatch ? ` alt="${escapeHtml(altMatch[1])}"` : ''} class="body-image">`;
    images.push(img);
    return `@@IMG_${idx}@@`;
  });
  text = text.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (match, alt, url) => {
    const trimmedUrl = url.trim();
    if (!/^https?:\/\//i.test(trimmedUrl)) return match;
    const idx = images.length;
    const img = `<img src="${escapeHtml(trimmedUrl)}" alt="${escapeHtml(alt)}" loading="lazy" class="body-image">`;
    images.push(img);
    return `@@IMG_${idx}@@`;
  });
  text = escapeHtml(text);
  for (let i = 0; i < images.length; i++) {
    text = text.split(`@@IMG_${i}@@`).join(images[i]);
  }
  return text;
}

function isChinese(str) {
  return /[\u4e00-\u9fa5]/.test(str);
}

function extractPrNumber(message) {
  const match = message.match(/#(\d+)/);
  return match ? match[1] : null;
}

function hexToRgba(hex, alpha) {
  if (!hex || hex.length !== 6) return `rgba(140,140,140,${alpha})`;
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ---------- Translation ----------
async function translateText(text) {
  if (translationCache.has(text)) return translationCache.get(text);
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('translate failed');
    const data = await res.json();
    let translated = '';
    if (data && data[0]) {
      for (const seg of data[0]) {
        if (seg[0]) translated += seg[0];
      }
    }
    translationCache.set(text, translated);
    return translated;
  } catch (e) {
    return null;
  }
}

async function tryTranslate(message, sha) {
  const firstLine = message.split('\n')[0];
  if (isChinese(firstLine)) return;
  const transEl = document.getElementById(`trans-${sha}`);
  if (!transEl) return;
  transEl.classList.add('loading');
  transEl.textContent = '翻译中...';
  const translated = await translateText(firstLine);
  if (translated && translated.trim() !== firstLine.trim()) {
    transEl.classList.remove('loading');
    transEl.textContent = translated;
  } else {
    transEl.style.display = 'none';
  }
}

function renderFileBlock(file) {
  const patch = file.patch || '';
  const additions = file.additions || 0;
  const deletions = file.deletions || 0;
  const status = file.status || 'modified';
  const statusLabel = { modified: 'M', added: 'A', removed: 'D', renamed: 'R' }[status] || status[0].toUpperCase();

  const diffHtml = patch ? renderDiff(patch) : '<div class="diff-line context"><span class="line-num"></span><span class="line-content" style="color:#6a6d80;font-style:italic">（二进制文件或无文本差异）</span></div>';

  return `
    <div class="file-block">
      <div class="file-header">
        <div class="file-name">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span style="color:${additions > 0 ? 'var(--md-sys-color-tertiary)' : deletions > 0 ? 'var(--md-sys-color-error)' : '#8a8da0'};font-weight:700">${statusLabel}</span>
          ${escapeHtml(file.filename)}
        </div>
        <div class="file-stats">
          <span class="add">+${additions}</span>
          <span class="del">-${deletions}</span>
          <button class="file-toggle" onclick="event.stopPropagation();toggleFile(this)">展开</button>
        </div>
      </div>
      <div class="file-diff">${diffHtml}</div>
    </div>
  `;
}

function toggleFile(btn) {
  const block = btn.closest('.file-block');
  const willOpen = !block.classList.contains('open');
  block.classList.toggle('open');
  btn.textContent = willOpen ? '收起' : '展开';
  if (willOpen) {
    setTimeout(() => {
      block.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
}

function renderDiff(patch) {
  const lines = patch.split('\n');
  let oldNum = 0, newNum = 0;
  const html = [];

  for (const line of lines) {
    if (line.startsWith('@@')) {
      const match = line.match(/@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
      if (match) { oldNum = parseInt(match[1]); newNum = parseInt(match[2]); }
      html.push(`<div class="diff-line hunk"><span class="line-num"></span><span class="line-content">${escapeHtml(line)}</span></div>`);
      continue;
    }
    if (line.startsWith('+') && !line.startsWith('+++')) {
      newNum++;
      html.push(`<div class="diff-line add"><span class="line-num">${newNum}</span><span class="line-content">${escapeHtml(line.slice(1))}</span></div>`);
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      oldNum++;
      html.push(`<div class="diff-line del"><span class="line-num">${oldNum}</span><span class="line-content">${escapeHtml(line.slice(1))}</span></div>`);
    } else if (line.startsWith('\\')) {
      html.push(`<div class="diff-line hunk"><span class="line-num"></span><span class="line-content">${escapeHtml(line)}</span></div>`);
    } else {
      oldNum++; newNum++;
      html.push(`<div class="diff-line context"><span class="line-num">${newNum}</span><span class="line-content">${escapeHtml(line.replace(/^ /, ''))}</span></div>`);
    }
  }
  return html.join('');
}

function getPRStateClass(pr) {

  if (pr.merged_at) return '已合并';
  if (pr.draft) return '草稿';

// ---------- Data fetching ----------
async function fetchRepo(repoConfig, perPage) {
  const etagKey = `commits_${repoConfig.owner}_${repoConfig.repo}_${perPage}`;
  const url = `https://api.github.com/repos/${repoConfig.owner}/${repoConfig.repo}/commits?per_page=${perPage}`;
  const result = await fetchWithEtag(url, etagKey);
  if (result.notModified) {
    const cached = loadCache(`commits_${repoConfig.key}_${perPage}`);
    if (cached) return { data: cached.data, fromCache: true };
    // cache miss but 304 — re-fetch without etag
    const res2 = await fetch(url);
    if (!res2.ok) throw new Error(`${repoConfig.repo}: ${res2.status}`);
    const data2 = await res2.json();
    saveCache(`commits_${repoConfig.key}_${perPage}`, data2);
    return { data: data2, fromCache: false };
  }
  if (result.rateLimited) {
    const cached = loadCache(`commits_${repoConfig.key}_${perPage}`);
    if (cached) return { data: cached.data, fromCache: true };
    throw new Error(`${repoConfig.repo}: API 限流`);
  }
  saveCache(`commits_${repoConfig.key}_${perPage}`, result.data);
  return { data: result.data, fromCache: false };
}

async function fetchCommitDetail(owner, repo, sha) {
  if (detailCache.has(sha)) return detailCache.get(sha);
  const etagKey = `detail_${owner}_${repo}_${sha}`;
  const url = `https://api.github.com/repos/${owner}/${repo}/commits/${sha}`;
  const result = await fetchWithEtag(url, etagKey);
  if (result.notModified) {
    const cached = loadCache(`detail_${sha}`);
    if (cached) { detailCache.set(sha, cached.data); return cached.data; }
  }
  if (result.rateLimited) {
    const cached = loadCache(`detail_${sha}`);
    if (cached) { detailCache.set(sha, cached.data); return cached.data; }
    throw new Error('detail: API 限流');
  }
  detailCache.set(sha, result.data);
  saveCache(`detail_${sha}`, result.data);
  return result.data;
}

async function fetchPulls(repo, perPage, state) {
  const etagKey = `pulls_${repo.owner}_${repo.repo}_${perPage}_${state}`;
  const url = `https://api.github.com/repos/${repo.owner}/${repo.repo}/pulls?state=${state}&per_page=${perPage}&sort=updated&direction=desc`;
  const result = await fetchWithEtag(url, etagKey);
  if (result.notModified) {
    const cached = loadCache(`pulls_${repo.key}_${perPage}_${state}`);
    if (cached) return { data: cached.data, fromCache: true };
  }
  if (result.rateLimited) {
    const cached = loadCache(`pulls_${repo.key}_${perPage}_${state}`);
    if (cached) return { data: cached.data, fromCache: true };
    throw new Error(`${repo.repo} pulls: API 限流`);
  }
  saveCache(`pulls_${repo.key}_${perPage}_${state}`, result.data);
  return { data: result.data, fromCache: false };
}

async function fetchIssues(repo, perPage, state) {
  const etagKey = `issues_${repo.owner}_${repo.repo}_${perPage}_${state}`;
  const url = `https://api.github.com/repos/${repo.owner}/${repo.repo}/issues?state=${state}&per_page=${perPage}&sort=updated&direction=desc`;
  const result = await fetchWithEtag(url, etagKey);
  if (result.notModified) {
    const cached = loadCache(`issues_${repo.key}_${perPage}_${state}`);
    if (cached) return { data: cached.data, fromCache: true };
  }
  if (result.rateLimited) {
    const cached = loadCache(`issues_${repo.key}_${perPage}_${state}`);
    if (cached) return { data: cached.data, fromCache: true };
    throw new Error(`${repo.repo} issues: API 限流`);
  }
  const filtered = Array.isArray(result.data) ? result.data.filter(i => !i.pull_request) : [];
  saveCache(`issues_${repo.key}_${perPage}_${state}`, filtered);
  return { data: filtered, fromCache: false };
}

async function fetchPRDetail(owner, repo, number) {
  const key = `${owner}/${repo}#${number}`;
  if (prDetailCache.has(key)) return prDetailCache.get(key);
  const etagKey = `pr_detail_${owner}_${repo}_${number}`;
  const url = `https://api.github.com/repos/${owner}/${repo}/pulls/${number}`;
  const result = await fetchWithEtag(url, etagKey);
  if (result.notModified) {
    const cached = loadCache(`pr_detail_${key}`);
    if (cached) { prDetailCache.set(key, cached.data); return cached.data; }
  }
  if (result.rateLimited) {
    const cached = loadCache(`pr_detail_${key}`);
    if (cached) { prDetailCache.set(key, cached.data); return cached.data; }
    throw new Error('pr detail: API 限流');
  }
  prDetailCache.set(key, result.data);
  saveCache(`pr_detail_${key}`, result.data);
  return result.data;
}

function updateUI(allCommits, animateAll) {
  const listEl = document.getElementById('commitList');
  commitStore = allCommits;

  allCommits.sort((a, b) => new Date(b.commit.commit.author.date) - new Date(a.commit.commit.author.date));

  const newShas = [];
  const html = allCommits.map(({ commit, repo }) => {
    const isNew = !isFirstLoad && !knownShas.has(commit.sha);
    if (isNew) newShas.push(commit.sha);
    const animate = animateAll || isNew;
    return renderCommit(commit, repo, isNew, animate);
  }).join('');

  if (allCommits.length === 0) {
    listEl.innerHTML = emptyStateHtml(commitFetchFailed ? '获取失败qwq' : '暂无提交记录');
  } else {
    listEl.innerHTML = html;
    if (animateAll || newShas.length > 0) {
      animateListEnter(listEl, newShas.length > 0 ? newShas : null);
    }
  }

  REPOS.forEach(r => {
    const count = allCommits.filter(c => c.repo.key === r.key).length;
    const el = document.getElementById(`count-${r.key}`);
    if (el) el.textContent = count;
  });

  if (newShas.length > 0) {
    newShas.forEach(sha => knownShas.add(sha));
  }

  allCommits.forEach(({ commit }) => {
    const firstLine = commit.commit.message.split('\n')[0];
    if (!isChinese(firstLine)) {
      tryTranslate(commit.commit.message, commit.sha);
    }
  });

  return newShas.length;
}

// ---------- Toggle handlers ----------
function findCommit(sha) {

}

async function toggleCommit(item) {
  const sha = item.dataset.sha;
  const owner = item.dataset.owner;
  const repo = item.dataset.repo;

  if (item.classList.contains('expanded')) {
    const detailEl = document.getElementById(`detail-${sha}`);
    animateCollapse(detailEl, () => item.classList.remove('expanded'));
    animateItemCollapse(item);
    return;
  }

  document.querySelectorAll('.commit-item.expanded').forEach(el => {
    const d = el.querySelector('.commit-detail');
    animateCollapse(d, () => el.classList.remove('expanded'));
    animateItemCollapse(el);
  });
  item.classList.add('expanded');
  animateItemExpand(item);

  const detailEl = document.getElementById(`detail-${sha}`);
  detailEl.innerHTML = renderDetailLoading();
  animateExpand(detailEl);

  try {
    const commitObj = findCommit(sha);
    const repoConfig = REPOS.find(r => r.owner === owner && r.repo === repo);
    const detail = await fetchCommitDetail(owner, repo, sha);
    detailEl.innerHTML = renderCommitDetail(detail, commitObj || { commit: { message: '', author: { date: '' } }, html_url: `https://github.com/${owner}/${repo}/commit/${sha}` }, repoConfig);
    if (detailEl.scrollHeight > 600) {
      setTimeout(() => detailEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    }
  } catch (e) {
    detailEl.innerHTML = `<div class="detail-grid"><div class="detail-loading" style="color:var(--md-sys-color-error)">详情加载失败</div></div>`;
  }
}

// ---------- View switching ----------
function switchView(view) {
  if (currentView === view || isSwitching) return;

  const cardIds = {
    commits: { card: 'commitListCard', extra: 'loadMoreWrap' },
    prs: { card: 'prListCard', extra: null },
    issues: { card: 'issueListCard', extra: null }
  };
  const fromInfo = cardIds[currentView];
  const toInfo = cardIds[view];
  const fromCard = fromInfo && document.getElementById(fromInfo.card);
  const toCard = toInfo && document.getElementById(toInfo.card);
  const fromExtra = fromInfo && fromInfo.extra ? document.getElementById(fromInfo.extra) : null;
  const toExtra = toInfo && toInfo.extra ? document.getElementById(toInfo.extra) : null;

  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  moveTabIndicator(view);

  if (typeof anime === 'undefined' || window.__noAnime || !fromCard || !toCard) {
    document.getElementById('commitListCard').style.display = view === 'commits' ? '' : 'none';
    document.getElementById('prListCard').style.display = view === 'prs' ? '' : 'none';
    document.getElementById('issueListCard').style.display = view === 'issues' ? '' : 'none';
    updateLoadMoreVisibility();
    if (view === 'prs' && !prLoaded && !prLoading) refreshPRs();
    if (view === 'issues' && !issueLoaded && !issueLoading) refreshIssues();
    applyRepoFilter();
    return;
  }

  isSwitching = true;
  const fadeOutTargets = [fromCard];
  if (fromExtra) fadeOutTargets.push(fromExtra);

  anime({
    targets: fadeOutTargets,
    opacity: [1, 0],
    translateZ: [0, -600],
    rotateX: [0, -60],
    scale: [1, 0.8],
    duration: 300,
    easing: 'easeInCubic',
    complete: function() {
      fromCard.style.display = 'none';
      fromCard.style.transform = '';
      fromCard.style.opacity = '';
      if (fromExtra) { fromExtra.style.display = 'none'; fromExtra.style.transform = ''; fromExtra.style.opacity = ''; }

      toCard.style.display = '';
      toCard.style.opacity = '0';
      toCard.style.transform = 'translateY(40px)';
      updateLoadMoreVisibility();
      const toExtraVisible = toExtra && document.getElementById('loadMoreWrap').style.display !== 'none';
      if (toExtraVisible) {
        toExtra.style.opacity = '0';
        toExtra.style.transform = 'translateY(40px)';
      }

      if (view === 'prs' && !prLoaded && !prLoading) refreshPRs();
      if (view === 'issues' && !issueLoaded && !issueLoading) refreshIssues();
      applyRepoFilter();

      const fadeInTargets = [toCard];
      if (toExtraVisible) fadeInTargets.push(toExtra);

      anime({
        targets: fadeInTargets,
        opacity: [0, 1],
        translateY: [40, 0],
        duration: 300,
        easing: 'easeOutCubic',
        complete: function() {
          toCard.style.transform = '';
          toCard.style.opacity = '';
          if (toExtra) { toExtra.style.transform = ''; toExtra.style.opacity = ''; }
          isSwitching = false;
        }
      });
    }
  });
}

function filterRepo(key) {
  if (repoFilter === key) return;
  repoFilter = key;
  document.querySelectorAll('.repo-badge').forEach(b => {
    const wasActive = b.classList.contains('active');
    const willBeActive = b.dataset.repo === repoFilter;
    b.classList.toggle('active', willBeActive);
    b.style.transform = '';
    if (willBeActive && !wasActive && typeof anime !== 'undefined' && !window.__noAnime) {
      anime({
        targets: b,
        scale: [0.94, 1],
        duration: 360,
        easing: 'easeOutBack',
        complete: function(anim) { b.style.transform = ''; }
      });
    }
  });
  applyRepoFilter();
}

function updateLoadMoreVisibility() {
  const wrap = document.getElementById('loadMoreWrap');
  if (!wrap) return;
  const shouldShow = currentView === 'commits' && !commitFetchFailed && !isFirstLoad;
  wrap.style.display = shouldShow ? 'block' : 'none';
}

function applyRepoFilter() {
  if (currentView === 'commits') {
    const filtered = repoFilter === 'all' ? commitStore : commitStore.filter(c => c.repo.key === repoFilter);
    const listEl = document.getElementById('commitList');
    if (filtered.length === 0) {
      listEl.innerHTML = emptyStateHtml(commitFetchFailed ? '获取失败qwq' : '该仓库暂无提交记录');
    } else {
      listEl.innerHTML = filtered.map(({ commit, repo }) => renderCommit(commit, repo, false, false)).join('');
    }
    document.getElementById('tabCommitCount').textContent = filtered.length;
  } else if (currentView === 'prs') {
    const filtered = repoFilter === 'all' ? prStore : prStore.filter(p => p.repo.key === repoFilter);
    const listEl = document.getElementById('prList');
    if (filtered.length === 0) {
      listEl.innerHTML = emptyStateHtml(prFetchFailed ? '获取失败qwq' : '该仓库暂无 Pull Request', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M6 8v8M18 8v8M6 8a4 4 0 0 1 4-4h4"/></svg>');
    } else {
      listEl.innerHTML = filtered.map(({ pr, repo }) => renderPR(pr, repo, false)).join('');
    }
    document.getElementById('tabPRCount').textContent = filtered.length;
  } else if (currentView === 'issues') {
    const filtered = repoFilter === 'all' ? issueStore : issueStore.filter(i => i.repo.key === repoFilter);
    const listEl = document.getElementById('issueList');
    if (filtered.length === 0) {
      listEl.innerHTML = emptyStateHtml(issueFetchFailed ? '获取失败qwq' : '该仓库暂无 Issues', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>');
    } else {
      listEl.innerHTML = filtered.map(({ issue, repo }) => renderIssue(issue, repo, false)).join('');
    }
    document.getElementById('tabIssueCount').textContent = filtered.length;
  }
}

// ---------- Refresh routines ----------
async function refreshAll(silent = false) {
  const indicator = document.getElementById('refreshIndicator');
  if (!silent) indicator.classList.add('refreshing');

  try {
    const results = await Promise.all(REPOS.map(r =>
      fetchRepo(r, displayCount)
        .then(res => res.data.map(c => ({ commit: c, repo: r, fromCache: res.fromCache })))
        .catch(e => { showError(`${r.repo}: ${e.message}`); return []; })
    ));

    const allCommits = results.flat();
    const anyFromCache = allCommits.some(c => c.fromCache);
    allCommits.forEach(c => delete c.fromCache);

    if (allCommits.length === 0) {
      commitFetchFailed = true;
      if (isFirstLoad) {
        loadCachedCommits();
        if (!isFirstLoad) {
          showError('API 限流，已从缓存恢复数据');
        } else {
          showError('API 限流，请稍后重试');
        }
      } else {
        showError('API 限流，显示缓存数据');
      }
      updateLoadMoreVisibility();
      return;
    }
    commitFetchFailed = false;

    const animateAll = isFirstLoad;
    const newCount = updateUI(allCommits, animateAll);

    if (isFirstLoad) {
      allCommits.forEach(c => knownShas.add(c.commit.sha));
      isFirstLoad = false;
      updateLoadMoreVisibility();
    }

    lastRefreshTime = Date.now();
    if (!anyFromCache) {
      saveCache('commits_all', allCommits);
    }
    updateRefreshText();

    if (newCount > 0 && !isFirstLoad) {
      showUpdateNotification(newCount, '提交');
    }
  } catch (e) {
    commitFetchFailed = true;
    showError('无法连接 GitHub API');
    loadCachedCommits();
    updateLoadMoreVisibility();
  } finally {
    indicator.classList.remove('refreshing');
  }
}

async function refreshPRs(silent = false) {
  if (prLoading) return;
  prLoading = true;
  const indicator = document.getElementById('refreshIndicator');
  if (!silent) indicator.classList.add('refreshing');

  try {
    const results = await Promise.all(REPOS.map(r =>
      fetchPulls(r, PR_ISSUE_PAGE_SIZE, 'all')
        .then(res => res.data.map(pr => ({ pr, repo: r })))
        .catch(e => { showError(`${r.repo} PR: ${e.message}`); return []; })
    ));
    const allPRs = results.flat();
    if (allPRs.length === 0 && prLoaded) {
      prFetchFailed = true;
      showError('PR API 限流，保留已加载数据');
      return;
    }
    if (allPRs.length === 0) {
      prFetchFailed = true;
      loadCachedPRs();
      if (!prLoaded) showError('PR API 限流，请稍后重试');
      return;
    }
    prFetchFailed = false;
    const oldPRCount = prStore.length;
    const animateAll = !prLoaded;
    updatePRUI(allPRs, animateAll);
    prLoaded = true;
    saveCache('prs_all', allPRs);
    const newPRCount = allPRs.length - oldPRCount;
    if (newPRCount > 0 && !animateAll) showUpdateNotification(newPRCount, 'PR');
  } catch (e) {
    showError('PR 加载失败');
    loadCachedPRs();
  } finally {
    prLoading = false;
    indicator.classList.remove('refreshing');
  }
}

async function refreshIssues(silent = false) {
  if (issueLoading) return;
  issueLoading = true;
  const indicator = document.getElementById('refreshIndicator');
  if (!silent) indicator.classList.add('refreshing');

  try {
    const results = await Promise.all(REPOS.map(r =>
      fetchIssues(r, PR_ISSUE_PAGE_SIZE, 'all')
        .then(res => res.data.map(issue => ({ issue, repo: r })))
        .catch(e => { showError(`${r.repo} Issues: ${e.message}`); return []; })
    ));
    const allIssues = results.flat();
    if (allIssues.length === 0 && issueLoaded) {
      issueFetchFailed = true;
      showError('Issues API 限流，保留已加载数据');
      return;
    }
    if (allIssues.length === 0) {
      issueFetchFailed = true;
      loadCachedIssues();
      if (!issueLoaded) showError('Issues API 限流，请稍后重试');
      return;
    }
    issueFetchFailed = false;
    const oldIssueCount = issueStore.length;
    const animateAll = !issueLoaded;
    updateIssueUI(allIssues, animateAll);
    issueLoaded = true;
    saveCache('issues_all', allIssues);
    const newIssueCount = allIssues.length - oldIssueCount;
    if (newIssueCount > 0 && !animateAll) showUpdateNotification(newIssueCount, 'Issues');
  } catch (e) {
    showError('Issues 加载失败');
    loadCachedIssues();
  } finally {
    issueLoading = false;
    indicator.classList.remove('refreshing');
  }
}

function loadCachedCommits() {
  const cached = loadCache('commits_all');
  if (cached && cached.data && cached.data.length > 0) {
    updateUI(cached.data, true);
    isFirstLoad = false;
    knownShas = new Set(cached.data.map(c => c.commit.sha));
    updateLoadMoreVisibility();
    if (cached.ts) { lastRefreshTime = cached.ts; updateRefreshText(); }
  }
}

function loadCachedPRs() {
  const cached = loadCache('prs_all');
  if (cached && cached.data && cached.data.length > 0) {
    updatePRUI(cached.data, true);
    prLoaded = true;
  }
}

function loadCachedIssues() {
  const cached = loadCache('issues_all');
  if (cached && cached.data && cached.data.length > 0) {
    updateIssueUI(cached.data, true);
    issueLoaded = true;
  }
}

function manualRefresh() {
  const indicator = document.getElementById('refreshIndicator');
  if (indicator.classList.contains('refreshing')) return;
  animateRefreshPulse(indicator);
  refreshAll();
  if (currentView === 'prs') refreshPRs();
  if (currentView === 'issues') refreshIssues();
}

async function loadMore() {
  if (isLoadingMore) return;
  isLoadingMore = true;
  const btn = document.getElementById('loadMoreBtn');
  btn.classList.add('loading');
  const textEl = btn.querySelector('.load-more-text');
  const prevText = textEl.textContent;

  try {
    displayCount += 10;
    textEl.textContent = '加载中...';

    const results = await Promise.all(REPOS.map(r =>
      fetchRepo(r, displayCount)
        .then(res => res.data.map(c => ({ commit: c, repo: r })))
        .catch(e => { showError(`${r.repo}: ${e.message}`); return []; })
    ));

    const allCommits = results.flat();
    updateUI(allCommits, false);
    allCommits.forEach(c => knownShas.add(c.commit.sha));
    saveCache('commits_all', allCommits);

    textEl.textContent = displayCount >= 100 ? '已加载全部' : '查看更多...';
    if (displayCount >= 100) btn.disabled = true;
  } catch (e) {
    showError('加载更多失败');
    displayCount -= 10;
    textEl.textContent = prevText;
  } finally {
    btn.classList.remove('loading');
    isLoadingMore = false;
  }
}

function showError(msg) {
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ---------- Update notification ----------
let updateTotalCount = 0;
let updateTimer = null;

function showUpdateNotification(count, type) {
  updateTotalCount += count;
  const refreshText = document.getElementById('refreshText');
  refreshText.setAttribute('data-notify', `接收到 ${updateTotalCount} 条更新`);
  if (updateTimer) clearTimeout(updateTimer);
  updateTimer = setTimeout(() => {
    refreshText.removeAttribute('data-notify');
    updateRefreshText();
    updateTotalCount = 0;
    updateTimer = null;
  }, 5000);
}

function updateRefreshText() {
  const refreshText = document.getElementById('refreshText');
  const notify = refreshText.getAttribute('data-notify');
  if (notify) { refreshText.textContent = notify; return; }
  if (lastRefreshTime) {
    const ago = formatTime(new Date(lastRefreshTime).toISOString());
    refreshText.textContent = `刷新于 ${ago}`;
  } else {
    refreshText.textContent = '点击刷新';
  }
}

// ---------- Event delegation ----------
document.getElementById('commitList').addEventListener('click', (e) => {
  if (e.target.closest('.detail-link, .pr-link-inline, .file-toggle')) return;
  const item = e.target.closest('.commit-item');
  if (item) toggleCommit(item);
});

document.getElementById('prList').addEventListener('click', (e) => {
  if (e.target.closest('.detail-link')) return;
  const item = e.target.closest('.pr-item');
  if (item) togglePR(item);
});

document.getElementById('issueList').addEventListener('click', (e) => {
  if (e.target.closest('.detail-link')) return;
  const item = e.target.closest('.issue-item');
  if (item) toggleIssue(item);
});

// ---------- Init ----------
loadEtags();

// Try to restore from cache first (instant display, zero API calls)
loadCachedCommits();

const cachedPRs = loadCache('prs_all');
if (cachedPRs && cachedPRs.data && cachedPRs.data.length > 0) {
  updatePRUI(cachedPRs.data, true);
  prLoaded = true;
}

const cachedIssues = loadCache('issues_all');
if (cachedIssues && cachedIssues.data && cachedIssues.data.length > 0) {
  updateIssueUI(cachedIssues.data, true);
  issueLoaded = true;
}

// Update "刷新于 x 分钟前" label every 30s (no API calls)
setInterval(updateRefreshText, 30000);
updateRefreshText();

// Initialize tab indicator position
initTabIndicator();
window.addEventListener('resize', initTabIndicator);

// Initialize announcement panel
initAnnouncement();

// Initialize custom repos and render badges
loadCustomRepos();

// Fetch fresh data on load (silent only if cache was restored)
refreshAll(!isFirstLoad);
</script>
